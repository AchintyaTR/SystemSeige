version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./finance.db
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - ./backend/finance.db:/app/finance.db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_INTERNAL_BACKEND_URL=http://backend:8000
    ports:
      - "3000:3000"
    environment:
      - NEXT_INTERNAL_BACKEND_URL=http://backend:8000
    depends_on:
      - backend

  tunnel:
    image: cloudflare/cloudflared
    command: tunnel --url http://frontend:3000
    depends_on:
      - frontend
